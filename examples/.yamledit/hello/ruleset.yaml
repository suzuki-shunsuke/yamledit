# yaml-language-server: $schema=https://raw.githubusercontent.com/suzuki-shunsuke/yamledit/main/json-schema/ruleset.json
rules:
  - path: "$"
    actions:
      - type: remove_keys
        keys:
          - name
      - type: rename_key
        key: old_key
        new_key: new_key
      - type: set_key
        key: added_key
        value: added value
      - type: sort_key
        expr: |
          a.key > b.key ? 1 : -1
  - path: "$.children"
    actions:
      - type: add_values
        values:
          - foo
        index: -1
      - type: remove_values
        expr: |
          value.value == "bar"
      - type: sort_list
        expr: |
          a.value == b.value ? 0 : (a.value > b.value ? 1 : -1)
