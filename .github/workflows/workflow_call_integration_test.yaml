---
name: integration test
on:
  workflow_call:
    secrets:
      TAKUMI_GUARD_BOT_ID:
        required: true
jobs:
  integration-test:
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on:
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}

      - run: |
          go install -ldflags "-X main.version=v3.0.0-local -X main.commit=$GITHUB_SHA -X main.date=$(date +"%Y-%m-%dT%H:%M:%SZ%:z" | tr -d '+')" ./cmd/yamledit
      - run: yamledit -v
      - run: yamledit new foo
      - run: test -f .yamledit/foo/ruleset.yaml
      - run: test -f .yamledit/foo/normal/test.yaml
      - run: test -f .yamledit/foo/normal/result.yaml
      - run: yamledit new test
      - run: yamledit new foo
      - run: yamledit new test
      - run: yamledit new zoo
      - run: test -f .yamledit/zoo/ruleset.yaml
      - run: test -f .yamledit/zoo/normal/test.yaml
      - run: test -f .yamledit/zoo/normal/result.yaml
      - run: yamledit new test
